<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>? - Coming Soon | Karya FA 🎨</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Menggunakan variabel warna yang sama dengan produk 1 */
        :root {
            --purple-dark: #553C9A;
            --purple-pastel: #E9D8FD;
            --blue-pastel: #BEE3F8;
            --bg-glass: rgba(255, 255, 255, 0.8);
        }

        .product-header-card {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            margin-bottom: 30px;
            border: 2px dashed var(--purple-pastel); /* Penanda proyek baru */
        }

        .product-main-flex {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .product-gallery {
            flex: 1.2;
            min-width: 300px;
            position: relative;
        }

        /* Efek overlay Coming Soon pada gambar */
        .product-gallery::after {
            content: "KAMBING SUN";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            background: var(--purple-dark);
            color: white;
            padding: 10px 30px;
            font-weight: 900;
            border-radius: 10px;
            font-size: 1.5rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            pointer-events: none;
        }

        .product-gallery img {
            width: 100%;
            border-radius: 20px;
            border: 4px solid var(--purple-pastel);
            filter: grayscale(0.8) blur(1px); /* Efek teaser */
        }

        .product-details {
            flex: 1;
            min-width: 300px;
        }

        .tag-status-soon {
            display: inline-block;
            background: #ebf8ff;
            color: #2b6cb0;
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 800;
            margin-bottom: 15px;
            border: 1px solid #bee3f8;
        }

        .price-text-placeholder {
            font-size: 2.2rem;
            font-weight: 800;
            color: #cbd5e0; /* Warna abu-abu karena harga belum rilis */
            margin: 10px 0 20px;
        }

        .btn-waiting {
            display: block;
            background: #edf2f7;
            color: #a0aec0;
            text-align: center;
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: not-allowed;
            border: 2px solid #e2e8f0;
        }

        .spec-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .spec-table td {
            padding: 10px 0;
            border-bottom: 1px solid #edf2f7;
            font-size: 0.95rem;
            color: #718096;
        }

        .spec-table td:first-child { font-weight: 700; color: var(--purple-dark); width: 40%; }

        .content-area {
            background: var(--bg-glass);
            padding: 40px;
            border-radius: 30px;
            line-height: 1.8;
            color: #4a5568;
        }

        .content-area h3 {
            color: var(--purple-dark);
            margin: 25px 0 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .feature-item-soon {
            background: white;
            padding: 15px;
            border-radius: 15px;
            border: 1px dashed var(--blue-pastel);
            font-size: 0.9rem;
            color: #718096;
        }

        /* Animasi sederhana untuk tag */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .tag-status-soon { animation: pulse 2s infinite; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <aside>
        <div class="brand-logo">Karya FA 🎬</div>
        <nav>
            <a href="index.html" class="nav-link-single">🏠 Beranda Utama</a>
            <a href="kontak.html" class="nav-link-single">📱 Hubungi Kami</a>
        </nav>
    </aside>

    <main>
        <div class="product-header-card">
            <div class="product-main-flex">
                <div class="product-gallery">
                    <img src="sr3-preview.png" alt="Legacy SR3 Coming Soon" onerror="this.src='https://via.placeholder.com/600x400/f0f0f0/553C9A?text=Legacy+SR3+Preview'">
                </div>

                <div class="product-details">
                    <span class="tag-status-soon">COMING SOON</span>
                    
                    <h1>Belum ada waktu buat nulis halaman ini heehehhe</h1>
         
<tr>.</tr>
                    <div class="btn-waiting">
                    sabar iyh
                    </div>
                </div>
            </div>
        </div>


        <footer style="margin-top: 40px; text-align: center; color: #718096; font-size: 0.9rem;">
            Made with ❤️ by Karya FA Production | © 2026
        </footer>
    </main>

</body>
</html>
